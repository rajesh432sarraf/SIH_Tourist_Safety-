<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Hub | Landing Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            font-family: sans-serif;
            text-align: center;
        }
        .hero {
            padding: 50px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 35px;
            background: white;
            color: #0072ff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to the Safety Hub Project</h1>
        <p>A secure companion for your next journey.</p>
        <a href="SIH.HTML" class="btn">ENTER HUB</a>
    </div>
</body>
</html>
