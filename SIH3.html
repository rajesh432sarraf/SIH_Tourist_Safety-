<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Hub Dashboard | Version 3</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --primary: #FF8C00;
      --bg: #121212;
      --card-bg: #1e1e1e;
      --text: #ffffff;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
    }
    .sidebar {
      width: 250px;
      height: 100vh;
      background: var(--card-bg);
      padding: 20px;
      border-right: 1px solid #333;
    }
    .main-content {
      flex: 1;
      padding: 30px;
    }
    #map {
      height: 400px;
      border-radius: 15px;
      margin-top: 20px;
    }
    .btn-sos {
      background: #ff4b2b;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Safety Hub V3</h2>
    <nav>
      <ul>
        <li>Dashboard</li>
        <li>Live Tracking</li>
        <li>Emergency Contacts</li>
        <li>Weather Scan</li>
      </ul>
    </nav>
  </div>
  <div class="main-content">
    <h1>Welcome to Safety Hub</h1>
    <div id="map"></div>
    <div style="margin-top: 30px;">
      <button class="btn-sos" onclick="alert('SOS SENT!')">TRIGGER SOS</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([20.5937, 78.9629], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  </script>
</body>
</html>
